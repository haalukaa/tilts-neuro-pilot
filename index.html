<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>TILTS Neuro Pilot</title>
</head>
<body>
  <h1>TILTS</h1>
  <p>Theatre Instrument Location & Tracking System</p>
  <input id="search" placeholder="Search instrument..." onkeyup="searchItems()">
  <div id="results"></div>

<script>
const data = [
  {name:"Adson Hook", shelf:"7", location:"56"},
  {name:"Bayonet Forceps Toothed", shelf:"7", location:"58"},
  {name:"Brain Retractors Malleables", shelf:"7", location:"57"},
  {name:"Williams Discectomy Retractor Set", shelf:"7", location:"78"},
  {name:"Yasargil Tumor Forceps", shelf:"7", location:"64"}
];

function searchItems() {
  const q = document.getElementById("search").value.toLowerCase();
  const results = data.filter(item => item.name.toLowerCase().includes(q));
  document.getElementById("results").innerHTML = results.map(item =>
    `<p><b>${item.name}</b><br>Shelf: ${item.shelf}<br>Location: ${item.location}</p>`
  ).join("");
}

searchItems();
</script>
</body>
</html>
